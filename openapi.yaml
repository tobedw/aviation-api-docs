  /livery/icao/{code}:
    servers:
      - url: https://airlines-api.logostream.dev
    get:
      summary: Aircraft livery by airline ICAO
      tags:
        - Livery API
      description: |
        Returns a high-resolution PNG of the aircraft painted in the airline's livery.
        Available from the **Startup plan** and above.

        Max native resolution: **2752 × 1536 px**.
        Only PNG is supported — no SVG available for liveries.
      parameters:
        - name: code
          in: path
          required: true
          description: ICAO airline code (2–3 letters)
          schema:
            type: string
          example: DLH
        - name: type
          in: query
          required: true
          description: "Aircraft type code, e.g. `319`, `787`, `330`, `73H`, `CR9`, `E90`"
          schema:
            type: string
          example: "319"
        - name: key
          in: query
          required: true
          description: Your API key
          schema:
            type: string
        - name: size
          in: query
          description: "Output width in pixels. Max: 2752. Examples: 600, 1600, 2752."
          schema:
            type: integer
            maximum: 2752
          example: 1600
      responses:
        '200':
          description: Aircraft livery PNG image
          content:
            image/png:
              schema:
                type: string
                format: binary
        '401':
          description: Invalid or missing API key
        '403':
          description: Plan does not include livery access

