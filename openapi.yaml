  /mcp:
    x-internal-path: https://aviation-mcp.logostream.dev
    post:
      tags:
        - MCP Server
      summary: Call an MCP tool
      operationId: mcpToolsCall
      description: |
        Connect Claude, Cursor, and other AI assistants to the Logostream Aviation database over the Model Context Protocol.

        ---

        ### What it is

        The Logostream Aviation MCP server exposes the full aviation database to AI agents. Your agent can look up airlines,
        airports, cities, routes, fleet data, and more — and receive structured responses it can reason over.

        | | |
        |---|---|
        | **Endpoint** | `https://aviation-mcp.logostream.dev` |
        | **Transport** | Streamable HTTP (JSON-RPC 2.0) |
        | **Protocol version** | 2024-11-05 |
        | **Authentication** | `x-api-key` header **or** OAuth 2.0 Bearer token |

        ---

        ### Authentication

        Two methods are supported — both are backwards compatible.

        **Option 1 — API Key header** (direct clients, curl, SDK)

        Pass your API key as a header on every request. The key is never a tool parameter.

        ```
        x-api-key: YOUR_API_KEY
        ```

        **Option 2 — OAuth 2.0 with PKCE** (claude.ai Web, ChatGPT, hosts that require OAuth)

        The server implements OAuth 2.0 Authorization Code Flow with PKCE (RFC 7636) and Dynamic Client Registration (RFC 7591).
        OAuth hosts discover and negotiate the flow automatically — no manual config required.

        | OAuth Endpoint | Description |
        |---|---|
        | `GET /.well-known/oauth-authorization-server` | Metadata discovery (RFC 8414) |
        | `POST /register` | Dynamic Client Registration — returns `client_id` |
        | `GET /authorize` | Login page — user enters their API key |
        | `POST /authorize` | Generates auth code → redirects to `redirect_uri?code=…` |
        | `POST /token` | Exchanges auth code for Bearer token (PKCE verified) |

        Token lifetime: auth codes **10 minutes** (single use), access tokens **1 hour**.

        **Add to claude.ai Web:**
        1. Settings → Integrations → Add custom connector
        2. URL: `https://aviation-mcp.logostream.dev`
        3. OAuth flow starts automatically → enter your API key → done

        MCP requests count against the same quota as your regular API usage. Find your key in the [developer dashboard](https://airline.logostream.dev).

        ---

        ### Tools

        | Tool | Description |
        |---|---|
        | `get_airline` | Look up airline by IATA or ICAO code |
        | `get_airport` | Look up airport by IATA or ICAO code |
        | `get_routes` | Routes filtered by origin, destination, or airline |
        | `get_route_map` | Great-circle route map as SVG or PNG |
        | `get_city` | City by IATA city code |
        | `get_country` | Country by ISO-2 code |
        | `get_aircraft` | Aircraft type by IATA type code |
        | `get_stats` | Network statistics for an airport or airline |
        | `get_connections` | One-stop connection options between two airports |
        | `get_routes_country_pair` | All routes between two countries |
        | `plan_trip` | Multi-leg trip planner from ordered IATA list |
        | `get_hubs` | Hub and focus-city listings |
        | `get_airport_map` | Multi-airport map as SVG or PNG |
        | `get_airport_diagram` | Airport layout diagram by ICAO code |
        | `get_news` | AI-consolidated aviation news stories, filterable by airline, airport, category, and sentiment |
        | `parse_trip` | Parse any flight text → full CO₂ emissions report (ICAO CEC v13.1, CSRD-compliant) |

        ---

        ### CO₂ Emissions (`parse_trip`)

        `parse_trip` accepts any unstructured text containing flight info and returns a complete sustainability report — no pre-processing needed.

        **Input formats that work:**

        | Input | Example |
        |---|---|
        | IATA codes + flight number | `LH400 FRA JFK A350` |
        | Dash-chain route | `FRA-DXB-SYD A380 EK` |
        | Via-keyword | `FRA via DXB to SYD` |
        | SITA MVT message | `MVT LH/400 .FRA1025 .JFK1310 A359` |
        | Booking confirmation snippet | `Flight: LH 400 From: FRA To: JFK Aircraft: A350-900` |

        **Parameters:** `raw_text` (required), `cabin_class` (economy/premium_economy/business/first), `passengers` (integer, adds group totals)

        **What the response includes:**
        - CO₂ per passenger for the selected cabin class (`co2_kg`, `co2_with_rfi_kg`)
        - Group total when `passengers > 1` (`co2_total_kg`, `carbon_offset.group_total`)
        - Per-leg breakdown for multi-stop routes (each segment calculated independently)
        - All four cabin classes in one call (`cabin_comparison`) — build a cabin picker without extra API calls
        - Train and car comparison for the same distance
        - Carbon offset cost at EU ETS price
        - Confidence score + parse stage so you know how reliable the result is
        - Airline logo URL, route map URL, brand colors (`visual_assets`)

        **Example call:**

        ```json
        {
          "jsonrpc": "2.0",
          "id": 1,
          "method": "tools/call",
          "params": {
            "name": "parse_trip",
            "arguments": {
              "raw_text": "LH400 FRA JFK A350",
              "cabin_class": "business",
              "passengers": 2
            }
          }
        }
        ```

        **Known limitations:** flight-number-only input (`LH400`) fails without a schedule database. City-name-only input (`Frankfurt to New York`) is unreliable — always include IATA codes when possible.

        ---

        ### Install in your client

        Connect to Claude Desktop, Claude Code, Cursor, VS Code, Codex, Windsurf, ChatGPT,
        and any other MCP-compatible client. Replace `YOUR_API_KEY` with your key from the
        [developer dashboard](https://airline.logostream.dev). All clients use the same endpoint
        and `x-api-key` header — only the config file location changes.

        **Universal config** — same shape works in most clients:

        ```json
        {
          "mcpServers": {
            "logostream-aviation": {
              "url": "https://aviation-mcp.logostream.dev",
              "headers": {
                "x-api-key": "YOUR_API_KEY"
              }
            }
          }
        }
        ```

        **Claude Code** — use the CLI:

        ```bash
        claude mcp add --transport http logostream-aviation \
          https://aviation-mcp.logostream.dev \
          --header "x-api-key: YOUR_API_KEY"
        ```

        Add `--scope user` to make it available across all projects.

        **Claude Desktop**
        - macOS: `~/Library/Application Support/Claude/claude_desktop_config.json`
        - Windows: `%APPDATA%\Claude\claude_desktop_config.json`

        Merge the `logostream-aviation` entry into `mcpServers`, restart Claude Desktop.

        **Cursor** — Settings → MCP or Command Palette → "MCP: Add Server", paste universal config, restart.

        **VS Code** — Command Palette → "MCP: Add Server", or create `.vscode/mcp.json` with the universal config, reload window.

        **Windsurf** — edit `~/.codeium/windsurf/mcp_config.json` (or Settings → Cascade → MCP), paste universal config, restart.

        **Codex** — add to `~/.codex/config.toml`:

        ```toml
        [mcp_servers.logostream-aviation]
        url = "https://aviation-mcp.logostream.dev"

        [mcp_servers.logostream-aviation.headers]
        x-api-key = "YOUR_API_KEY"
        ```

        **ChatGPT** (Pro/Team/Enterprise) — Settings → Connectors → Add MCP server.
        URL: `https://aviation-mcp.logostream.dev`, header: `x-api-key: YOUR_API_KEY`.

        **Other clients** — any client supporting remote MCP over Streamable HTTP works.
        Use the universal config and consult your client's docs for the config file location.

        **Verify with curl** — test the connection directly before wiring up a client:

        ```bash
        curl https://aviation-mcp.logostream.dev \
          --request POST \
          --header 'Content-Type: application/json' \
          --header 'x-api-key: YOUR_API_KEY' \
          --data '{
            "jsonrpc": "2.0",
            "id": 1,
            "method": "tools/call",
            "params": {
              "name": "get_airline",
              "arguments": { "iata": "LH" }
            }
          }'
        ```

        **Verify with your AI client** — once installed, try this prompt:

        > Which non-stop routes does Lufthansa operate from Frankfurt, and what aircraft types are used on the longest ones?

        Your assistant will call `get_routes`, `get_stats`, and `get_airline` in sequence and return a structured answer with fleet data.

        ---

        ### Response shape

        A successful tool call returns the data as JSON text in `result.content[0].text`.
        Parse it with `JSON.parse()` in your agent code.

        When a resource cannot be found, the tool returns `result.isError: true` with a descriptive message
        rather than a JSON-RPC error — so your agent can recover gracefully.

        ---

        ### Errors

        | Code | Meaning |
        |---|---|
        | `-32001` | Unauthorized — missing or invalid `x-api-key` |
        | `-32029` | Rate limit exceeded (120 req/min per key) |
        | `-32601` | Method not found |
        | `-32602` | Invalid arguments — unknown tool or missing required parameter |
        | `-32700` | Parse error — malformed JSON or body > 64 KB |
        | `-32603` | Internal server error |

        ---

        ### Usage and quotas

        MCP requests count against the same quota as your regular API usage.
        Rate limit: **120 requests per minute** per API key.
        Exceeded limit returns HTTP 429 with JSON-RPC error code `-32029`.
      servers:
        - url: https://aviation-mcp.logostream.dev
          description: MCP Server
      requestBody:
        required: true
        content:
          application/json:
            schema:
