  /v1/news:
    get:
      tags:
        - Aviation Data API
      summary: Aviation news stories
      operationId: getNews
      description: |
        Returns AI-consolidated aviation news stories. Multiple raw articles covering the same event are
        grouped into a single story with a generated title, summary, sentiment, category, and entity associations.

        Stories are updated hourly by a consolidation pipeline that crawls RSS feeds, then uses Claude to
        match new articles against existing stories and classify new ones. Entity associations (airlines,
        airports, aircraft types) are resolved against the database — no hallucinated codes.

        **Filter logic:** `iata`/`icao` use OR logic (matches either). Combining airline + airport filters uses AND logic (story must match both).

        **Translation:** Add `lang` (BCP-47) to translate `title` and `summary`. Uses a 3-tier cache (KV → Supabase → Google Translate) — first request for a language is slower, subsequent requests are served from cache.

        ### Categories

        | Value | Description |
        |---|---|
        | `fleet_order` | Aircraft orders, deliveries |
        | `route_launch` | New routes, frequency changes |
        | `accident` | Accidents, incidents, safety |
        | `financial` | Results, revenue, costs |
        | `labor` | Strikes, unions, staffing |
        | `regulation` | Regulation, slots, legislation |
        | `partnership` | Codeshares, alliances, acquisitions |
        | `operations` | Delays, cancellations, schedule |
        | `sustainability` | SAF, CO2, green initiatives |
        | `technology` | IFE, digital, apps |
        | `general` | Other aviation news |
      parameters:
