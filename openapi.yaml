          description: Plan does not include livery access

  /livery/awb/{id}:
    servers:
      - url: https://airlines-api.logostream.dev
    get:
      summary: Aircraft livery by AWB number or prefix
      tags:
        - Livery API
      description: |
        Look up an aircraft livery by Air Waybill (AWB) number.
        Accepts either:
        - A **3-digit IATA AWB prefix** (e.g. `020` for Lufthansa, `057` for Air France)
        - A **full AWB number** (e.g. `020-12345678`) — the prefix is extracted automatically

        The prefix is resolved to the airline's ICAO code, then the livery is rendered.
      parameters:
        - name: id
          in: path
          required: true
          description: "3-digit AWB prefix (e.g. `020`) or full AWB number (e.g. `020-12345678`)"
          schema:
            type: string
          example: "020"
        - name: type
          in: query
          required: true
          description: "Aircraft type code, e.g. `B763`, `319`, `787`"
          schema:
            type: string
          example: B763
        - name: key
          in: query
          required: true
          schema:
            type: string
        - name: size
          in: query
          description: "Output width in pixels. Max: 2752."
          schema:
            type: integer
            maximum: 2752
          example: 1600
      responses:
        '200':
          description: Aircraft livery PNG image
          content:
            image/png:
              schema:
                type: string
                format: binary
        '401':
          description: Invalid or missing API key
        '403':
          description: Plan does not include livery access
        '404':
          description: AWB prefix not found / airline unknown
  /v1/airport-diagram/{icao}:
    get:
      tags:
        - Airport Diagrams
      summary: Airport diagram by ICAO
      description: |
        Returns runway geometry and optional GeoJSON for a single airport identified by ICAO code.

        **Coverage levels:**
        - `full_detail` — runways + full GeoJSON (taxiways, terminals, aprons)
        - `partial` — runways + limited GeoJSON
        - `runway_only` — runways only, `geojson` is `null`
      operationId: getAirportDiagram
      parameters:
        - name: icao
          in: path
          required: true
          schema:
            type: string
          example: EGLL
      responses:
        '200':
          description: Airport diagram
          content:
            application/json:
              schema:
                type: object
                properties:
                  icao:
                    type: string
                    example: EGLL
                  iata:
                    type: string
                    nullable: true
                    example: LHR
                  coverage:
                    type: string
                    enum: [full_detail, partial, runway_only]
                    example: full_detail
                  runway_count:
                    type: integer
                    example: 2
                  runways:
                    type: array
                    items:
                      type: object
                      properties:
                        designator:
                          type: string
                          example: 09L/27R
                        length_ft:
                          type: integer
                          example: 12001
                        length_m:
                          type: integer
                          example: 3658
                        width_ft:
                          type: integer
                          example: 164
                        width_m:
                          type: integer
                          example: 50
                        surface:
                          type: string
                          nullable: true
                          example: asphalt
                        lighted:
                          type: boolean
                          example: true
                        closed:
                          type: boolean
                          example: false
                        threshold_low:
                          type: object
                          properties:
                            lat: { type: number, example: 51.47749 }
                            lng: { type: number, example: -0.489439 }
                            designator: { type: string, example: 09L }
                            elevation_ft: { type: integer, example: 79 }
                        threshold_high:
                          type: object
                          properties:
                            lat: { type: number, example: 51.477681 }
                            lng: { type: number, example: -0.433227 }
                            designator: { type: string, example: 27R }
                            elevation_ft: { type: integer, example: 78 }
                  geojson:
                    type: object
                    nullable: true
                    description: GeoJSON FeatureCollection. `null` when coverage is `runway_only`.
                  meta:
                    type: object
                    properties:
                      source:
                        type: string
                        example: osm
                      osm_fetched_at:
                        type: string
                        format: date-time
                        nullable: true
                      manually_updated_at:
                        type: string
                        format: date-time
                        nullable: true
        '404':
          description: Airport not found

  /v1/airport-diagram/{icao}/runways:
    get:
      tags:
        - Airport Diagrams
      summary: Runway array only
      description: Returns only the runway array for an airport — no GeoJSON.
      operationId: getAirportRunways
      parameters:
        - name: icao
          in: path
          required: true
          schema:
            type: string
          example: EGLL
      responses:
        '200':
          description: Runway list
          content:
            application/json:
              schema:
                type: object
                properties:
                  icao:
                    type: string
                  runway_count:
                    type: integer
                  runways:
                    type: array
                    items:
                      type: object
        '404':
          description: Airport not found

  /v1/airport-diagram/{icao}/geojson:
    get:
      tags:
        - Airport Diagrams
      summary: Raw GeoJSON only
      description: Returns raw GeoJSON FeatureCollection for the airport. Returns 404 if coverage is `runway_only`.
      operationId: getAirportGeoJSON
      parameters:
        - name: icao
          in: path
          required: true
          schema:
            type: string
          example: EGLL
      responses:
        '200':
          description: GeoJSON FeatureCollection
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Airport not found or no GeoJSON available

  /v1/airport-diagram:
    get:
      tags:
        - Airport Diagrams
      summary: Bulk airport diagrams
      description: |
        Returns diagrams for multiple airports. GeoJSON is omitted from bulk responses.

        At least one filter is required: `icao` (comma-separated) or `country_code`.
      operationId: getAirportDiagramBulk
      parameters:
        - name: icao
          in: query
          description: Comma-separated ICAO codes
          schema:
            type: string
          example: EGLL,EDDF,LFPG
        - name: country_code
          in: query
          description: ISO 3166-1 alpha-2 country code
          schema:
            type: string
          example: DE
      responses:
        '200':
          description: Array of airport diagrams (no geojson field)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
        '400':
          description: No filter provided

  /mcp:
    x-internal-path: https://aviation-mcp.logostream.dev
    post:
      tags:
        - MCP Server
      summary: Call an MCP tool
      operationId: mcpToolsCall
      description: |
        Connect Claude, Cursor, and other AI assistants to the Logostream Aviation database over the Model Context Protocol.

        ---

        ### What it is

        The Logostream Aviation MCP server exposes the full aviation database to AI agents. Your agent can look up airlines,
        airports, cities, routes, fleet data, and more — and receive structured responses it can reason over.

        | | |
        |---|---|
        | **Endpoint** | `https://aviation-mcp.logostream.dev` |
        | **Transport** | Streamable HTTP (JSON-RPC 2.0) |
        | **Protocol version** | 2024-11-05 |
        | **Authentication** | `x-api-key` header |

        ---

        ### Authentication

        Pass your API key as a header on every request. The key is never a tool parameter.

        ```
        x-api-key: YOUR_API_KEY
        ```

        MCP requests count against the same quota as your regular API usage. Find your key in the [developer dashboard](https://airline.logostream.dev).

        ---

        ### Tools

        | Tool | Description |
        |---|---|
        | `get_airline` | Look up airline by IATA or ICAO code |
        | `get_airport` | Look up airport by IATA or ICAO code |
        | `get_routes` | Routes filtered by origin, destination, or airline |
        | `get_route_map` | Great-circle route map as SVG or PNG |
        | `get_city` | City by IATA city code |
        | `get_country` | Country by ISO-2 code |
        | `get_aircraft` | Aircraft type by IATA type code |
        | `get_stats` | Network statistics for an airport or airline |
        | `get_connections` | One-stop connection options between two airports |
        | `get_routes_country_pair` | All routes between two countries |
        | `plan_trip` | Multi-leg trip planner from ordered IATA list |
        | `get_hubs` | Hub and focus-city listings |
        | `get_airport_map` | Multi-airport map as SVG or PNG |
        | `get_airport_diagram` | Airport layout diagram by ICAO code |

        ---

        ### Install in your client

        **Claude Desktop** — edit `~/Library/Application Support/Claude/claude_desktop_config.json`:

        ```json
        {
          "mcpServers": {
            "logostream-aviation": {
              "type": "http",
              "url": "https://aviation-mcp.logostream.dev",
              "headers": { "x-api-key": "YOUR_API_KEY" }
            }
          }
        }
        ```

        **Cursor / VS Code / Windsurf** — add to your MCP settings:

        ```json
        {
          "logostream-aviation": {
            "type": "http",
            "url": "https://aviation-mcp.logostream.dev",
            "headers": { "x-api-key": "YOUR_API_KEY" }
          }
        }
        ```

        ---

        ### Response shape

        A successful tool call returns the data as JSON text in `result.content[0].text`.
        Parse it with `JSON.parse()` in your agent code.

        When a resource cannot be found, the tool returns `result.isError: true` with a descriptive message
        rather than a JSON-RPC error — so your agent can recover gracefully.

        ---

        ### Errors

        | Code | Meaning |
        |---|---|
        | `-32001` | Unauthorized — missing or invalid `x-api-key` |
        | `-32029` | Rate limit exceeded (120 req/min per key) |
        | `-32601` | Method not found |
        | `-32602` | Invalid arguments — unknown tool or missing required parameter |
        | `-32700` | Parse error — malformed JSON or body > 64 KB |
        | `-32603` | Internal server error |

        ---

        ### Usage and quotas

        MCP requests count against the same quota as your regular API usage.
        Rate limit: **120 requests per minute** per API key.
        Exceeded limit returns HTTP 429 with JSON-RPC error code `-32029`.
      servers:
        - url: https://aviation-mcp.logostream.dev
          description: MCP Server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jsonrpc, id, method]
              properties:
                jsonrpc:
                  type: string
                  enum: ["2.0"]
                id:
                  type: integer
                  example: 1
                method:
                  type: string
                  enum: [initialize, ping, tools/list, tools/call]
                  example: tools/call
                params:
                  type: object
                  properties:
                    name:
                      type: string
                      example: get_airline
                    arguments:
                      type: object
                      example: { "iata": "LH" }
            examples:
              tools_call:
                summary: Call get_airline
                value:
                  jsonrpc: "2.0"
                  id: 1
                  method: tools/call
                  params:
                    name: get_airline
                    arguments:
                      iata: LH
              tools_list:
                summary: List all tools
                value:
                  jsonrpc: "2.0"
                  id: 1
                  method: tools/list
              ping:
                summary: Ping / health check
                value:
                  jsonrpc: "2.0"
                  id: 1
                  method: ping
      responses:
        '200':
          description: JSON-RPC response (check `result.isError` for tool-level errors)
          content:
            application/json:
              schema:
                type: object
                properties:
                  jsonrpc:
                    type: string
                    example: "2.0"
                  id:
                    type: integer
                    example: 1
                  result:
                    type: object
                    properties:
                      content:
                        type: array
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                              example: text
                            text:
                              type: string
                              example: '{"iata":"LH","name":"Lufthansa",...}'
                      isError:
                        type: boolean
                        example: false
              examples:
                success:
                  summary: Successful tool call
                  value:
                    jsonrpc: "2.0"
                    id: 1
                    result:
                      content:
                        - type: text
                          text: '{"iata":"LH","name":"Lufthansa"}'
                tool_error:
                  summary: Tool-level error
                  value:
                    jsonrpc: "2.0"
                    id: 1
                    result:
                      isError: true
                      content:
                        - type: text
                          text: "Provide one of: iata, icao."
        '401':
          description: Missing x-api-key header
          content:
            application/json:
              example:
                jsonrpc: "2.0"
                id: null
                error:
                  code: -32001
                  message: "Missing x-api-key header on MCP transport."
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              example:
                jsonrpc: "2.0"
                id: null
                error:
                  code: -32029
                  message: "Rate limit exceeded. Max 120 requests per minute."
