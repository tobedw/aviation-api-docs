      tags:
        - Map API
      parameters:
        - name: country
          in: query
          description: ISO 2-letter country code to show only airports in that country
          schema:
            type: string
          example: DE
        - name: limit
          in: query
          description: Maximum number of airports to include (default 300)
          schema:
            type: integer
            default: 300
          example: 300
        - name: style
          in: query
          description: "Color preset: `default`, `dark`, `light`, `minimal`, `printable`, `sepia`, `boarding-pass`, `night-flight`."
          schema:
            type: string
            enum: [default, dark, light, minimal, printable, sepia, boarding-pass, night-flight]
        - name: day_night
          in: query
          schema:
            type: integer
            enum: [0, 1]
        - name: format
          in: query
          schema:
            type: string
            enum: [svg, png]
            default: svg
        - name: size
          in: query
          schema:
            type: integer
          example: 2000
      responses:
        '200':
          description: Map image
          content:
            image/svg+xml:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

