                                example: Simple Flying
                              url:
                                type: string
                                example: https://simpleflying.com/example
                        associated_airlines:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                              name:
                                type: string
                                example: Lufthansa
                              iata:
                                type: string
                                example: LH
                              icao:
                                type: string
